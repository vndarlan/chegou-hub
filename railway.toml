[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'cd backend && echo \"=== EXECUTANDO MIGRAÇÕES ===\" && python manage.py showmigrations --plan | grep \"\\[ \\]\" || echo \"Nenhuma migração pendente\" && python manage.py migrate --verbosity=2 && echo \"=== MIGRAÇÕES CONCLUÍDAS ===\" && mkdir -p staticfiles/media && python manage.py collectstatic --noinput --verbosity=2 && echo \"=== INICIANDO SERVIDOR ASGI ===\" && gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --log-level info --timeout 1800 --keep-alive 300 --max-requests 0'"
# healthcheckPath = "/api/"
# healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[variables]
NODE_ENV = "production"
CI = "false"
DISABLE_ESLINT_PLUGIN = "true"
GENERATE_SOURCEMAP = "false"